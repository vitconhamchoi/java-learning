version: '3.8'

services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  product-service:
    build: ./product-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - ZONE=us-east
      - WEIGHT=3
    depends_on:
      eureka-server:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      product-service:
        condition: service_started
