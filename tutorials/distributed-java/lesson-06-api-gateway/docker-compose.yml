version: '3.8'

services:
  # API Gateway - điểm vào duy nhất
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: distributed/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=myProductionSecretKey1234567890123456789012345
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - UPSTREAM_SERVICE_URL=http://upstream-service:8081
    depends_on:
      - upstream-service
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Upstream Service - microservice phía sau Gateway
  upstream-service:
    build:
      context: ./upstream-service
      dockerfile: Dockerfile
    image: distributed/upstream-service:latest
    container_name: upstream-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gateway-network:
    driver: bridge
