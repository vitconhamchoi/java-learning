server:
  port: 8080

spring:
  application:
    name: order-service

inventory:
  service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.distributed.order: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
