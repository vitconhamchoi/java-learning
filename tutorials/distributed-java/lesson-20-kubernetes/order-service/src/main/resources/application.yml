server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: order-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  environment: ${ENVIRONMENT:local}
  replica-id: ${REPLICA_ID:${HOSTNAME:local-1}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,readiness,liveness
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${app.environment}
