version: '3.8'
services:
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports: ["8081:8081"]
    networks: [cb-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    container_name: order-service
    ports: ["8080:8080"]
    environment:
      - INVENTORY_SERVICE_URL=http://inventory-service:8081
    depends_on:
      inventory-service:
        condition: service_healthy
    networks: [cb-network]

networks:
  cb-network:
    driver: bridge
