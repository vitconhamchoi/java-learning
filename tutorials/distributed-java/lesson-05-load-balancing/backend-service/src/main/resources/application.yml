server:
  port: ${PORT:8081}

spring:
  application:
    name: backend-service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    # Weight metadata: dùng bởi WeightedLoadBalancer để phân phối traffic
    metadata-map:
      weight: ${WEIGHT:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.distributed.backend: DEBUG
