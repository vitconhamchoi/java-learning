server:
  port: 8080

spring:
  application:
    name: rate-limiter-demo
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

resilience4j:
  ratelimiter:
    instances:
      apiRateLimiter:
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 0
        registerHealthIndicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,ratelimiters
  endpoint:
    health:
      show-details: always
