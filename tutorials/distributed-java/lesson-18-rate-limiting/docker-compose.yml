version: '3.8'
services:
  redis:
    image: redis:7
    container_name: redis-ratelimit
    ports: ["6379:6379"]
    networks: [ratelimit-network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rate-limiter-demo:
    build: ./rate-limiter-demo
    container_name: rate-limiter-demo
    ports: ["8080:8080"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks: [ratelimit-network]

networks:
  ratelimit-network:
    driver: bridge
